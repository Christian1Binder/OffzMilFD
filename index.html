<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TacLearn: Officer Command</title>
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="src/css/animations.css">
    <link rel="stylesheet" href="src/css/timeline.css">
</head>
<body>
    <div id="particles"></div>
    <div id="app">
        <!-- SPA Container -->
        <div id="dashboard-view" class="view hidden"></div>
        <div id="module-view" class="view hidden"></div>
        <div id="unit-view" class="view hidden"></div>
        <div id="quiz-view" class="view hidden"></div>
        <div id="practice-view" class="view hidden"></div>
        <div id="profile-view" class="view hidden"></div>
        <div id="timeline-view" class="view hidden timeline-page" style="background-color: #6bb2e4; padding-top: 20px;"></div>
    </div>

    <!-- Navigation Bar (Always Visible) -->
    <nav id="main-nav">
        <div class="nav-logo">TacLearn</div>
        <div class="nav-links">
            <button class="nav-btn active" data-target="dashboard">
                <span class="icon">🏠</span>
                <span class="label">Startseite</span>
            </button>
            <button class="nav-btn" data-target="modules">
                <span class="icon">📚</span>
                <span class="label">Module</span>
            </button>
            <button class="nav-btn" data-target="timeline">
                <span class="icon">⚔️</span>
                <span class="label">Zeitstrahl</span>
            </button>
            <button class="nav-btn" data-target="practice">
                <span class="icon">🎯</span>
                <span class="label">Üben</span>
            </button>
            <button class="nav-btn" data-target="profile">
                <span class="icon">🎖️</span>
                <span class="label">Profil</span>
            </button>
        </div>
    </nav>

    <script type="module" src="src/js/main.js?v=5"></script>
</body>
</html>
